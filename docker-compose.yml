services:
  postgres:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_DB: memburrow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d memburrow"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  memory-service:
    image: memburrow:local
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /bin/sh
      - -ec
      - |
        memory-migrator
        memory-worker &
        exec memory-api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/memburrow
      API_BIND_ADDR: 0.0.0.0:8080
      API_AUTH_TOKEN: dev-token
      WORKER_POLL_INTERVAL_MS: 1500
      WORKER_BATCH_SIZE: 32
      WORKER_MAX_RETRY: 8
      RECALL_CANDIDATE_LIMIT: 64
      RECONCILE_ENABLED: "true"
      RECONCILE_INTERVAL_SECONDS: 120
      RECONCILE_BATCH_SIZE: 200
      QDRANT_URL: http://qdrant:6333
      OPENAI_BASE_URL: https://api.openai.com/v1
      OPENAI_API_KEY: sk-REPLACE_ME
      OPENAI_EXTRACT_MODEL: gpt-4o-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMS: 1536
      LOG_FORMAT: json
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  qdrant-data:
